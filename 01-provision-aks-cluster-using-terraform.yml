

trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
- name: DEV_ENVIRONMENT
  value: dev
- name: QA_ENVIRONMENT
  value: qa  

stages:
  - stage: TerraformValidate
    jobs:
      -  job: TerraformValidateJob
         continueOnError: false
         steps:
         - task: PublishPipelineArtifact@1
           displayName: Publish Artifact
           inputs:
             targetPath: '$(System.DefaultWorkingDirectory)/terraform-manifest'
             artifact: 'terraform-manifest-out'
             publishLocation: 'pipeline'
         - task: TerraformInstaller@1
           displayName: Terraform Install
           inputs:
             terraformVersion: '1.14.8'
         - task: TerraformTask@5
           displayName: Terraform Init
           inputs:
             provider: 'azurerm'
             command: 'init'
             workingDirectory: '$(System.DefaultWorkingDirectory)/terraform-manifest'
             backendServiceArm: 'terraform-aks-azurerm-svc-con'
             backendAzureRmResourceGroupName: 'storageaccount'
             backendAzureRmStorageAccountName: 'mvpstorage1244'
             backendAzureRmContainerName: 'tfstatefile'
             backendAzureRmKey: 'aks-base.tfstate'
         - task: TerraformTask@5
           displayName: Terraform Validate
           inputs:
             provider: 'azurerm'
             command: 'validate'
             workingDirectory: '$(System.DefaultWorkingDirectory)/terraform-manifest'
  - stage: 
    jobs:
      - deployment: DeployDevAKSCluster
        displayName: DeployDevAKSCluster
        pool:
         vmImage: 'ubuntu-latest'
        environment: $(DEV_ENVIRONMENT) 
        strategy:
         runOnce:
           deploy:
             steps:
               - task: DownloadSecureFile@1
                 inputs:
                   secureFile: 'aks-terraform-devops-ssh-key-ububtu.pub'
               - task: TerraformTask@5
                 displayName: Terraform Init
                 inputs:
                   provider: 'azurerm'
                   command: 'init'
                   workingDirectory: '$(Pipeline.Workspace)/terraform-manifest-out'
                   backendServiceArm: 'terraform-aks-azurerm-svc-con'
                   backendAzureRmResourceGroupName: 'storageaccount'
                   backendAzureRmStorageAccountName: 'mvpstorage1244'
                   backendAzureRmContainerName: 'tfstatefile'
                   backendAzureRmKey: 'aks-$(DEV_ENVIRONMENT).tfstate'
               - task: TerraformTask@5
                 displayName: Terraform Plan
                 inputs:
                   provider: 'azurerm'
                   command: 'plan'
                   workingDirectory: '$(Pipeline.Workspace)/terraform-manifest-out'
                   commandOptions: '-var linux_admin_password=$(sshkey.secureFilePath) -var environment=$(DEV_ENVIRONMENT) -out $(Pipeline.Workspace)/terraform-manifest-out/$(DEV_ENVIRONMENT)-$(Build.BuildId).out'
                   environmentServiceNameAzureRM: 'terraform-aks-azurerm-svc-con'
         
               - task: TerraformTask@5
                 displayName: Terraform Apply
                 inputs:
                   provider: 'azurerm'
                   command: 'apply'
                   workingDirectory: '$(Pipeline.Workspace)/terraform-manifest-out'
                   commandOptions: '$(Pipeline.Workspace)/terraform-manifest-out/$(DEV_ENVIRONMENT)-$(Build.BuildId).out'
                   environmentServiceNameAzureRM: 'terraform-aks-azurerm-svc-con'
         
